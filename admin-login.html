<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="assets/icons/icon-72.png" type="image/png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Acesso Restrito</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <style>
      body.login-page {
        background: linear-gradient(
          135deg,
          #0d0d1a 0%,
          #1a1a2e 50%,
          #16213e 100%
        );
      }
      .login-logo-icon {
        background: linear-gradient(135deg, #334155, #1e293b);
      }
      .admin-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 20px;
        margin-bottom: 4px;
      }
      .admin-badge svg {
        flex-shrink: 0;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: rgba(255, 255, 255, 0.35);
        font-size: 13px;
        text-decoration: none;
        margin-top: 20px;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: rgba(255, 255, 255, 0.65);
      }
    </style>
  </head>
  <body class="login-page">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"
            />
          </svg>
        </div>
        <span class="admin-badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"
            />
          </svg>
          Acesso Restrito
        </span>
        <h1 style="margin-top: 8px">Painel Admin</h1>
        <p>Somente para administradores autorizados</p>
      </div>

      <!-- Formulário -->
      <form id="admin-login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
              />
            </svg>
            <input
              class="form-control"
              type="email"
              id="email"
              name="email"
              placeholder="admin@email.com"
              autocomplete="email"
              required
            />
          </div>
          <span class="form-error hidden" id="email-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"
              />
            </svg>
            <input
              class="form-control"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>
          <span class="form-error hidden" id="password-error"></span>
        </div>

        <span
          class="form-error hidden"
          id="general-error"
          style="display: block; margin-bottom: 12px"
        ></span>

        <button type="submit" class="btn btn-primary btn-block" id="btn-entrar">
          Entrar no Painel
        </button>
      </form>

      <div style="text-align: center">
        <a href="index.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
            />
          </svg>
          Voltar
        </a>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
      const form = document.getElementById("admin-login-form");
      const btnEntrar = document.getElementById("btn-entrar");
      const generalError = document.getElementById("general-error");

      function showError(msg) {
        generalError.textContent = msg;
        generalError.classList.remove("hidden");
        generalError.style.display = "block";
      }

      function hideError() {
        generalError.classList.add("hidden");
        generalError.style.display = "none";
      }

      function setLoading(on) {
        btnEntrar.disabled = on;
        btnEntrar.textContent = on ? "Verificando..." : "Entrar no Painel";
      }

      // Se já está logado como admin, redireciona direto
      auth.onAuthStateChanged(async (user) => {
        if (!user) return;
        try {
          const snap = await firebase
            .database()
            .ref("users/" + user.uid)
            .once("value");
          const data = snap.val();
          if (data?.tipo === "admin") {
            window.location.replace("admin.html");
          }
        } catch (_) {}
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showError("Preencha e-mail e senha.");
          return;
        }

        setLoading(true);
        try {
          // 1. Autentica no Firebase Auth
          let cred;
          try {
            cred = await auth.signInWithEmailAndPassword(email, password);
          } catch (authErr) {
            const authMsgs = {
              "auth/user-not-found": "E-mail não cadastrado.",
              "auth/wrong-password": "Senha incorreta.",
              "auth/invalid-email": "E-mail inválido.",
              "auth/invalid-credential": "E-mail ou senha incorretos.",
              "auth/too-many-requests":
                "Muitas tentativas. Aguarde alguns minutos e tente novamente.",
            };
            showError(
              authMsgs[authErr.code] ||
                "Erro ao autenticar: " + authErr.message,
            );
            setLoading(false);
            return;
          }

          // 2. Verifica o tipo no Realtime Database
          let data = null;
          try {
            const snap = await firebase
              .database()
              .ref("users/" + cred.user.uid)
              .once("value");
            data = snap.val();
          } catch (dbErr) {
            await auth.signOut();
            showError(
              "Não foi possível verificar as permissões. Verifique as regras do Realtime Database ou se o registro do admin foi criado.",
            );
            console.error("[Admin Login] Erro ao ler DB:", dbErr);
            setLoading(false);
            return;
          }

          if (!data) {
            await auth.signOut();
            showError(
              'Conta autenticada, mas sem registro no banco de dados. Crie o nó users/{uid} com tipo: "admin" no Firebase Console.',
            );
            return;
          }

          if (data.tipo === "admin") {
            window.location.replace("admin.html");
          } else {
            await auth.signOut();
            showError(
              "Acesso não autorizado. Esta área é exclusiva para administradores.",
            );
          }
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
