<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dumbbellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B35C3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1744;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)" />

  <!-- Subtle grid pattern -->
  <line x1="128" y1="0" x2="128" y2="512" stroke="#6B35C3" stroke-width="1" opacity="0.1"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#6B35C3" stroke-width="1" opacity="0.1"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="#6B35C3" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="128" x2="512" y2="128" stroke="#6B35C3" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#6B35C3" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="#6B35C3" stroke-width="1" opacity="0.1"/>

  <!-- Dumbbell shape -->
  <!-- Left outer plate -->
  <rect x="48" y="196" width="60" height="120" rx="14" ry="14" fill="url(#dumbbellGrad)" />
  <!-- Left inner plate -->
  <rect x="112" y="216" width="36" height="80" rx="10" ry="10" fill="url(#dumbbellGrad)" opacity="0.85" />
  <!-- Bar handle -->
  <rect x="148" y="238" width="216" height="36" rx="18" ry="18" fill="url(#dumbbellGrad)" />
  <!-- Right inner plate -->
  <rect x="364" y="216" width="36" height="80" rx="10" ry="10" fill="url(#dumbbellGrad)" opacity="0.85" />
  <!-- Right outer plate -->
  <rect x="404" y="196" width="60" height="120" rx="14" ry="14" fill="url(#dumbbellGrad)" />

  <!-- Red accent bar (lightning bolt effect) -->
  <polygon points="236,300 276,220 296,220 256,340 216,340 256,260 236,300" fill="url(#accentGrad)" opacity="0.0" />

  <!-- "A" letter below dumbbell -->
  <text x="256" y="420" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="96" fill="url(#accentGrad)" letter-spacing="-2">A</text>

  <!-- "PRO" small text -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="url(#dumbbellGrad)" letter-spacing="8">PRO</text>
</svg>
