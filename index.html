<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="assets/icons/icon-72.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treino Pro</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6B35C3" />
    <link rel="stylesheet" href="css/splash.css" />
  </head>
  <body>
    <!-- Estado de carregamento (visível enquanto verifica autenticação) -->
    <div id="splash-loading" class="splash-loading">
      <div class="spinner"></div>
    </div>

    <!-- Landing page (visível apenas para não autenticados) -->
    <div id="landing" class="landing hidden">
      <div class="landing-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="white">
          <path
            d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"
          />
        </svg>
      </div>
      <h1 class="landing-title">Treino Pro</h1>
      <p class="landing-sub">
        Gerencie treinos e acompanhe a evolução dos seus alunos
      </p>
      <a href="login.html" class="btn-landing">Entrar</a>
      <a href="cadastro.html" class="btn-landing-outline">Criar conta</a>

      <!-- Link admin oculto — acesse admin-login.html diretamente pela URL -->
      <a
        href="admin-login.html"
        class="btn-admin-icon"
        title="Acesso Admin"
        style="opacity: 0; pointer-events: none; position: absolute"
        aria-hidden="true"
        tabindex="-1"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"
          />
        </svg>
      </a>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
      auth.onAuthStateChanged(async (user) => {
        if (!user) {
          document.getElementById("splash-loading").classList.add("hidden");
          document.getElementById("landing").classList.remove("hidden");
          return;
        }
        try {
          const snap = await firebase
            .database()            firebase deploy --only functions
            .ref("users/" + user.uid)
            .once("value");
          const data = snap.val();
          if (data?.tipo === "professor") {
            window.location.replace("professor.html");
          } else if (data?.tipo === "aluno") {
            window.location.replace("aluno.html");
          } else {
            document.getElementById("splash-loading").classList.add("hidden");
            document.getElementById("landing").classList.remove("hidden");
          }
        } catch (e) {
          document.getElementById("splash-loading").classList.add("hidden");
          document.getElementById("landing").classList.remove("hidden");
        }
      });
    </script>
    <footer
      style="
        width: 100%;
        text-align: center;
        padding: 1.5rem 0 1rem 0;
        font-size: 1rem;
        color: #6b7280;
        background: none;
      "
    >
      Criado e desenvolvido por Carlos Felipe Lima Victoriani
    </footer>
  </body>
</html>
